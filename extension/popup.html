<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAMBA-WAVE</title>
  <link rel="icon" href="icon16.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: 'Segoe UI', sans-serif;
      background: #0F0F0F;
      color: #E5E5E5;
    }

    .container {
      display: flex;
      flex-direction: column;
      padding: 18px 18px 14px;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon { width: 36px; height: 36px; border-radius: 8px; }
    .app-name { font-size: 15px; font-weight: 700; color: #FFB84D; }
    .version { font-size: 10px; color: #666; margin-left: auto; }
    .divider { width: 100%; height: 1px; background: #2D2D2D; }

    .field-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .field-label .required { color: #FF6B6B; }

    .input {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #2D2D2D;
      border-radius: 5px;
      background: #1A1A1A;
      color: #E5E5E5;
      font-size: 11px;
      font-family: monospace;
    }
    .input:focus { outline: none; border-color: #FFB84D; }

    .btn-row {
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #2D2D2D;
      border-radius: 5px;
      background: rgba(30,30,30,0.8);
      color: #E5E5E5;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { background: rgba(50,50,50,0.9); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary {
      background: #FFB84D;
      color: #000;
      border-color: #FFB84D;
    }
    .btn-primary:hover { background: #FFC870; }
    .btn-test { border-color: rgba(255,140,0,0.3); color: #FFB84D; }
    .btn-score { border-color: rgba(255,140,0,0.3); color: #FFB84D; }

    .status {
      font-size: 10px;
      color: #888;
      text-align: center;
      min-height: 14px;
      word-break: break-all;
    }
    .status.ok { color: #51CF66; }
    .status.err { color: #FF6B6B; }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 10px;
      color: #22c55e;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icon48.png" class="icon">
      <div class="app-name">SAMBA-WAVE</div>
      <div class="version" id="version"></div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="field-label">
        🔗 백엔드 URL <span class="required">*</span>
      </div>
      <input
        type="url"
        id="proxyUrl"
        class="input"
        placeholder="https://your-backend.example.com"
        autocomplete="off"
      >
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnSave">💾 저장</button>
      <button class="btn btn-test" id="btnTest">🔍 연결 테스트</button>
    </div>

    <div class="status" id="status"></div>

    <div class="divider"></div>

    <div class="sync-badge" id="connBadge">
      <span class="sync-dot" id="connDot"></span>
      <span id="connText">연결 확인 중...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
