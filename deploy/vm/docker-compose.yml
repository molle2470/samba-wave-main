# VM 배포용 docker-compose
# 구성: Caddy (HTTPS) → samba-wave-api (FastAPI) → Cloud SQL Proxy
#
# 사전 준비:
# 1. /opt/samba/.env 에 환경변수 배치 (WRITE_DB_*, READ_DB_*, 기타 시크릿)
# 2. /opt/samba/sa-key.json 에 Cloud SQL 접근 서비스 계정 키 배치
# 3. sudo docker login ghcr.io (이미지 pull 권한)
#
# 실행:
#   cd /opt/samba && sudo docker compose up -d
#
# 로그:
#   sudo docker compose logs -f samba-api

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # /opt/samba/.env 에 R2_PUBLIC_HOST=pub-XXXX.r2.dev 정의 필수
    # (Caddyfile 의 /images/* reverse_proxy 가 환경변수 치환으로 사용)
    env_file:
      - /opt/samba/.env
    depends_on:
      - samba-api
    networks:
      - samba-net

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
    restart: unless-stopped
    command:
      - "--credentials-file=/sa-key.json"
      - "--address=0.0.0.0"
      - "--port=5432"
      - "fresh-sanctuary-489804-v4:asia-northeast3:samba-wave-db"
    volumes:
      - /opt/samba/sa-key.json:/sa-key.json:ro
    networks:
      - samba-net

  # Blue (메인) — 평소 활성. Caddy lb_policy first 의 우선 upstream.
  samba-api:
    image: asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest
    restart: unless-stopped
    depends_on:
      - cloud-sql-proxy
    env_file:
      - /opt/samba/.env
    environment:
      ENVIRONMENT: production
      WRITE_DB_HOST: cloud-sql-proxy
      WRITE_DB_PORT: "5432"
      READ_DB_HOST: cloud-sql-proxy
      READ_DB_PORT: "5432"
      GUNICORN_CMD_ARGS: "--timeout 600 --graceful-timeout 600"
      WEB_CONCURRENCY: "1"
    networks:
      - samba-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Green (스테이징) — 평소 stopped. 무중단 배포 시 임시 활성화되어 Caddy 자동 fallback 대상.
  # 'staging' profile 로 격리해 평상시 'docker compose up -d' 에 포함되지 않음.
  samba-api-staging:
    image: asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest
    restart: "no"
    profiles: ["staging"]
    depends_on:
      - cloud-sql-proxy
    env_file:
      - /opt/samba/.env
    environment:
      ENVIRONMENT: production
      WRITE_DB_HOST: cloud-sql-proxy
      WRITE_DB_PORT: "5432"
      READ_DB_HOST: cloud-sql-proxy
      READ_DB_PORT: "5432"
      GUNICORN_CMD_ARGS: "--timeout 600 --graceful-timeout 600"
      WEB_CONCURRENCY: "1"
    networks:
      - samba-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # 배경제거 워커는 VM에서 실행하지 않는다 — local_bg_worker.py는 사용자 로컬 PC에서
  # 직접 실행하여 PC 자원을 활용한다 (cd backend && uv run python scripts/local_bg_worker.py).
  # VM에서 함께 돌릴 경우 rembg/pymatting이 CPU 200%를 점유하여 api gunicorn worker가
  # starvation으로 SIGKILL/timeout 되는 사고가 반복되어 제거함 (2026-04-29).

networks:
  samba-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
